name: Bug report
description: Something in the SDK or CLI is broken
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - timr-sdk
        - timr-cli
        - both / unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pnpm why timr-sdk` or `timr --version`
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "22.x"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or a code snippet. If this hits the timr API, redact any tokens.
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
