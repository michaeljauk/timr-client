modules:
  jira:issuePanel:
    - key: timr-issue-panel
      resource: issue-panel
      resolver:
        function: resolver
      render: native
      title: timr
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      description: Track Jira issue time in timr.

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: issue-panel
    path: src/ui/issue-panel/index.tsx

app:
  runtime:
    name: nodejs22.x
    architecture: arm64
    memoryMB: 512
  id: ari:cloud:ecosystem::app/bb01c8a8-20db-4951-8c82-528a68b2df12

permissions:
  scopes:
    - read:jira-user
    - read:jira-work
  external:
    fetch:
      backend:
        # Exact hosts only — no wildcards.
        # api.timr.com  → REST API (DEFAULT_BASE_URL in timr-sdk)
        # system.timr.com → OAuth2 token endpoint (DEFAULT_TOKEN_URL in timr-sdk)
        - https://api.timr.com
        - https://system.timr.com

# M3 will declare a storage entity for the active-timer state with an indexed
# `startedAt` attribute (required for the orphan sweep). M1 reads no storage.
